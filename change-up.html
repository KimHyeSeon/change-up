<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Change-Up! 입장권 확인!</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width,viewport-fit=cover,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
        <link rel="stylesheet" href="change_up.css">
    </head>
    <body>
        <div class="wrap">
            <div class="container">
                <div class="content">
                    <div class="inner">
                        <!-- <div class="video">
                            <video playsinline autoplay muted loop preload="auto" id="changeUpVideo">
                                <source src="sound/bgm_change_up.mp4" type="video/mp4">
                            </video>
                        </div> -->
                        <div class="sound">
                             <audio id="bgMusic" loop>
                                <source src="./bgm_changeup.mp3" type="audio/mp3">
                            </audio>
                        </div>
                    </div>
                    <div class="box">
                        <h1 class="logo"><span class="blind">change up!</span></h1>
                        <div class="text">성경학교에 온<br>여러분을<br class="tablet"> 환영해요♥</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script> -->
        

        <script>
       // 1. DOM(HTML 구조)이 완전히 로드되면 실행됩니다.
        window.addEventListener('DOMContentLoaded', function() {
            var audioCtx = document.getElementById('bgMusic');

            if (audioCtx) {
                // 2. 브라우저에게 배경음악 재생을 요청합니다.
                var playPromise = audioCtx.play();

                if (playPromise !== undefined) {
                    playPromise.then(function() {
                        console.log("깃허브 페이지: 배경음악 즉시 자동 재생 성공");
                    }).catch(function(error) {
                        console.log("크롬/사파리 정책으로 자동 재생 차단 -> 첫 클릭 시 재생 대기");

                        // 3. 브라우저 차단 시, 사용자가 화면을 터치하거나 클릭하는 순간 음악 시작
                        var playOnUserGesture = function() {
                            audioCtx.play().then(function() {
                                console.log("사용자 동작 확인: 배경음악 재생 성공");
                            }).catch(function(e) { 
                                console.error("재생 실패:", e); 
                            });
                        };
                        
                        // 이벤트가 딱 한 번만 실행되고 사라지도록 { once: true } 설정
                        window.addEventListener('click', playOnUserGesture, { once: true });
                        window.addEventListener('touchstart', playOnUserGesture, { once: true });
                    });
                }
            }
        });
        </script>
    </body>
</html>
