<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Change-Up! 입장권 확인!</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width,viewport-fit=cover,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
        <link rel="stylesheet" href="change_up.css">
    </head>
    <body>
        <div class="wrap">
            <div class="container">
                <div class="content">
                    <div class="inner">
                        <!-- <div class="video">
                            <video playsinline autoplay muted loop preload="auto" id="changeUpVideo">
                                <source src="sound/bgm_change_up.mp4" type="video/mp4">
                            </video>
                        </div> -->
                        <div class="sound">
                             <audio id="Audio" loop autoplay>
                                <source src="./sound/bgm_changeup.mp3" type="audio/mpeg">
                            </audio>
                        </div>
                    </div>
                    <div class="box">
                        <h1 class="logo"><span class="blind">change up!</span></h1>
                        <div class="text">성경학교에 온<br>여러분을<br class="tablet"> 환영해요♥</div>
                    </div>
                </div>
            </div>
        </div>
        <!-- <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script> -->
        

        <script>
        // 문서 준비가 완료되면 실행 (jQuery의 $(function())과 동일한 역할)
        window.addEventListener('DOMContentLoaded', function() {
            // id가 bgMusic인 audio 태그를 직접 찾습니다.
            var audioCtx = document.getElementById('Audio');

            if (audioCtx) {
                var playPromise = audioCtx.play();

                if (playPromise !== undefined) {
                    playPromise.then(function() {
                        console.log("배경음악 자동 재생 성공");
                    }).catch(function(error) {
                        console.log("브라우저 정책으로 차단됨 -> 첫 클릭 시 재생 준비");

                        // 화면(window)을 딱 한 번(once: true)만 클릭하거나 터치하면 재생
                        var playOnUserGesture = function() {
                            audioCtx.play().catch(function(e) { console.log(e); });
                        };
                        
                        window.addEventListener('click', playOnUserGesture, { once: true });
                        window.addEventListener('touchstart', playOnUserGesture, { once: true });
                    });
                }
            }
        });
        </script>
    </body>
</html>
