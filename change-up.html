<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Change-Up! 입장권 확인!</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width,viewport-fit=cover,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
        <link rel="stylesheet" href="change_up.css">
    </head>
    <body>
        <div class="wrap">
            <div class="container">
                <div class="content">
                    <div class="inner">
                        <audio id="Audio" autoplay>
                            <source src="./sound/bgm_changeup.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                    <div class="box">
                        <h1 class="logo"><span class="blind">change up!</span></h1>
                        <div class="text">성경학교에 온<br>여러분을<br class="tablet"> 환영해요♥</div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script>
            $(document).ready(function() {
                const audio = $('#Audio')[0]; // jQuery 객체에서 오디오 DOM 요소 추출
                const delayTime = 3000; // 딜레이 시간 (3000ms = 3초)

                // 1. 자동 재생 (Autoplay 구현)
                // 최근 브라우저 정책상 사용자의 첫 클릭/상호작용 이후에만 작동할 수 있습니다.
                audio.play().catch(function(error) {
                    console.log("브라우저 정책으로 인해 자동 재생이 차단되었습니다. 사용자가 화면을 클릭하면 재생을 시도합니다.");
                    
                    // 차단 시, 사용자가 문서 내부를 클릭할 때 재생 트리거
                    $(document).one('click', function() {
                        audio.play();
                    });
                });

                // 2. 루프 딜레이 재생 (Loop + Delay 구현)
                $('#Audio').on('ended', function() {
                    setTimeout(function() {
                        audio.play();
                    }, delayTime);
                });
            });
        </script>
    </body>
</html>
