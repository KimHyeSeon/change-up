<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Change-Up! 입장권 확인!</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width,viewport-fit=cover,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
        <link rel="stylesheet" href="change_up.css">
    </head>
    <body>
        <div class="wrap">
            <div class="container">
                <div class="content">
                    <div class="inner">
                        <!-- <div class="video">
                            <video playsinline autoplay muted loop preload="auto" id="changeUpVideo">
                                <source src="sound/bgm_change_up.mp4" type="video/mp4">
                            </video>
                        </div> -->
                        <div class="sound">
                             <audio id="Audio" loop autoplay>
                                <source src="./sound/bgm_changeup.mp3" type="audio/mpeg">
                            </audio>
                        </div>
                    </div>
                    <div class="box">
                        <h1 class="logo"><span class="blind">change up!</span></h1>
                        <div class="text">성경학교에 온<br>여러분을<br class="tablet"> 환영해요♥</div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script>
            $(function() {
                var $audio = $('#Audio');

                if ($audio.length > 0) {
                    var audioCtx = $audio.get(0);

                    // 1. 브라우저 정책상 처음에는 무조건 재생이 차단되므로 예외 처리를 걸어둡니다.
                    var playPromise = audioCtx.play();

                    if (playPromise !== undefined) {
                        playPromise.then(function() {
                            // 매우 드물게 브라우저 자체 설정으로 자동 재생이 허용된 경우
                            console.log("브라우저 허용으로 배경음악 즉시 자동 재생");
                        }).catch(function(error) {
                            // 대부분의 크롬/사파리 환경에서는 이쪽(차단)으로 들어옵니다.
                            console.log("브라우저 정책으로 자동 재생 차단됨 -> 사용자 첫 클릭 대기 중...");

                            // 2. 사용자가 화면을 처음 클릭하거나 터치하는 순간 음악을 재생합니다.
                            // '.one()' 메서드는 이벤트를 딱 한 번만 실행하고 스스로 소멸하므로 성능에 좋습니다.
                            $('body').one('click touchstart', function() {
                                audioCtx.play().then(function() {
                                    console.log("사용자 상호작용 감지: 배경음악 재생 시작");
                                }).catch(function(err) {
                                    console.error("재생 실패:", err);
                                });
                            });
                        });
                    }
                }
            });
        </script>
    </body>
</html>
